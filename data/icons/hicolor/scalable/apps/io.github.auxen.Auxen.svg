<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <!-- Dark circle background -->
  <circle cx="64" cy="64" r="60" fill="#1c1b22"/>
  <circle cx="64" cy="64" r="60" fill="none" stroke="#2a2933" stroke-width="1.5"/>

  <!-- Stylized ox head silhouette -->
  <g transform="translate(64,68)">
    <!-- Left horn -->
    <path d="M-28,-20 C-38,-32 -42,-40 -36,-46 C-32,-50 -26,-46 -22,-38 L-18,-28"
          fill="none" stroke="#d4a039" stroke-width="4" stroke-linecap="round"/>
    <!-- Right horn -->
    <path d="M28,-20 C38,-32 42,-40 36,-46 C32,-50 26,-46 22,-38 L18,-28"
          fill="none" stroke="#d4a039" stroke-width="4" stroke-linecap="round"/>

    <!-- Head shape -->
    <path d="M-22,-18 C-26,-8 -24,4 -18,12 C-14,18 -8,22 0,24
             C8,22 14,18 18,12 C24,4 26,-8 22,-18
             C18,-26 8,-30 0,-30 C-8,-30 -18,-26 -22,-18 Z"
          fill="#d4a039"/>

    <!-- Snout / nose area -->
    <ellipse cx="0" cy="12" rx="10" ry="7" fill="#c4902a"/>
    <!-- Nostrils -->
    <ellipse cx="-4" cy="13" rx="2.5" ry="2" fill="#1c1b22"/>
    <ellipse cx="4" cy="13" rx="2.5" ry="2" fill="#1c1b22"/>

    <!-- Eyes -->
    <ellipse cx="-10" cy="-6" rx="3" ry="3.5" fill="#1c1b22"/>
    <ellipse cx="10" cy="-6" rx="3" ry="3.5" fill="#1c1b22"/>
    <!-- Eye highlights -->
    <ellipse cx="-9" cy="-7" rx="1" ry="1.2" fill="#f0ece4" opacity="0.6"/>
    <ellipse cx="11" cy="-7" rx="1" ry="1.2" fill="#f0ece4" opacity="0.6"/>

    <!-- Headphone band (arc over the head) -->
    <path d="M-26,-16 C-28,-34 -16,-46 0,-46 C16,-46 28,-34 26,-16"
          fill="none" stroke="#a39e93" stroke-width="3.5" stroke-linecap="round"/>

    <!-- Left ear cup -->
    <rect x="-32" y="-22" width="10" height="16" rx="4" ry="4" fill="#a39e93"/>
    <rect x="-31" y="-20" width="8" height="12" rx="3" ry="3" fill="#6b6860"/>
    <!-- Left ear cup detail -->
    <rect x="-30" y="-17" width="6" height="6" rx="2" ry="2" fill="#504d47"/>

    <!-- Right ear cup -->
    <rect x="22" y="-22" width="10" height="16" rx="4" ry="4" fill="#a39e93"/>
    <rect x="23" y="-20" width="8" height="12" rx="3" ry="3" fill="#6b6860"/>
    <!-- Right ear cup detail -->
    <rect x="24" y="-17" width="6" height="6" rx="2" ry="2" fill="#504d47"/>
  </g>
</svg>
